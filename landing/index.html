    margin-bottom: 32px; position: relative;

    width: 6px; height: 6px; border-radius: 50%; background: var(--green);
    animation: pulse 2s infinite;
  }

    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .hero h1 {
    font-size: clamp(40px, 7vw, 72px); font-weight: 700;
    line-height: 1.1; margin-bottom: 16px;
    position: relative;
    background: linear-gradient(135deg, #fff 0%, #fff 50%, var(--blue) 100%);

    background-clip: text;

  .hero .slogan {
    font-size: clamp(18px, 3vw, 24px); color: var(--blue);

    background: var(--blue); color: #fff;
    box-shadow: 0 4px 24px rgba(29,155,240,0.3);
  }
  .btn-hero-primary:hover {
    background: var(--blue-dark); transform: translateY(-2px);
    box-shadow: 0 8px 32px rgba(29,155,240,0.4);
  }
  .btn-hero-secondary {
    background: rgba(255,255,255,0.06); color: var(--text-primary);
    border: 1px solid var(--border);

    background: rgba(255,255,255,0.1); transform: translateY(-2px);

    text-align: center; margin-bottom: 64px;

    .step { gap: 16px; }
    .hero { padding: 100px 20px 60px; }
  }
  @media (max-width: 480px) {

    .btn-hero { justify-content: center; }

const APP_URL = 'http://159.89.204.255:8088/';
let lang = localStorage.getItem('tq_landing_lang') || (navigator.language.startsWith('zh') ? 'zh-CN' : 'en');

function t(key) {
  return (I18N[lang] || I18N['zh-CN'])[key] || key;
}

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('langToggle').textContent = t('lang.toggle');

  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-i18n-html]').forEach(el => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });
  document.querySelectorAll('[data-i18n-alt]').forEach(el => {
    el.alt = t(el.dataset.i18nAlt);
  });
}

function switchLang() {
  lang = lang === 'zh-CN' ? 'en' : 'zh-CN';
  localStorage.setItem('tq_landing_lang', lang);
  applyLang();
}

function handleTry() {
  if (APP_URL) {
    window.open(APP_URL, '_blank');
  } else {
    alert(t('try.alert'));
  }
  return false;
}

document.querySelectorAll('a[href^="#"]').forEach(anchor => {
  anchor.addEventListener('click', function(e) {
    const href = this.getAttribute('href');
    if (href === '#try') {
      if (!APP_URL) return;
    }
    const target = document.querySelector(href);
    if (target) {
      e.preventDefault();
      target.scrollIntoView({ behavior: 'smooth' });
    }
  });
});

applyLang();
</script>
