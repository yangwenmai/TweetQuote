<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tweet Quote — 让引用重新拥有上下文</title>
<meta name="description" content="Tweet Quote 把 Twitter / X 的引用链整理成一张清晰、可分享、可翻译的图像，强调上下文，而不是噱头。">
<meta property="og:title" content="Tweet Quote — Context, Framed Beautifully">
<meta property="og:description" content="Turn quote chains into a composed, shareable image. Built for context, clarity, and bilingual reading.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://tweetquote.app">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Tweet Quote — Context, Framed Beautifully">
<meta name="twitter:description" content="A calmer, more editorial way to turn quote chains into shareable images.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --paper: #f4efe6;
    --paper-deep: #ebe2d3;
    --surface: rgba(255, 251, 245, 0.72);
    --surface-strong: rgba(255, 251, 245, 0.9);
    --ink: #171411;
    --muted: #675e54;
    --line: rgba(23, 20, 17, 0.14);
    --line-strong: rgba(23, 20, 17, 0.24);
    --accent: #284d73;
    --accent-soft: #d9e3ee;
    --clay: #b86e4f;
    --shadow: 0 18px 60px rgba(45, 33, 20, 0.12);
    --radius-lg: 28px;
    --radius-md: 18px;
    --content: 1180px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Manrope', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
    color: var(--ink);
    background:
      linear-gradient(to bottom, rgba(255,255,255,0.22), rgba(255,255,255,0) 280px),
      linear-gradient(90deg, rgba(23,20,17,0.03) 1px, transparent 1px),
      linear-gradient(rgba(23,20,17,0.03) 1px, transparent 1px),
      var(--paper);
    background-size: auto, 36px 36px, 36px 36px, auto;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  a { color: inherit; }

  .page-shell {
    position: relative;
  }

  .page-shell::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 15% 10%, rgba(40,77,115,0.08), transparent 28%),
      radial-gradient(circle at 88% 22%, rgba(184,110,79,0.08), transparent 24%);
    opacity: 0.9;
  }

  .container {
    width: min(var(--content), calc(100% - 40px));
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  .section {
    padding: 42px 0;
  }

  .section + .section {
    border-top: 1px solid var(--line);
  }

  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(255, 251, 245, 0.68);
  }

  .eyebrow::before {
    content: '';
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--clay);
  }

  .display {
    font-family: 'Noto Serif SC', Georgia, serif;
    letter-spacing: -0.03em;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(18px);
    background: rgba(244, 239, 230, 0.78);
    border-bottom: 1px solid rgba(23, 20, 17, 0.08);
  }

  .topbar-inner {
    min-height: 78px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }

  .brand {
    display: inline-flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
  }

  .brand-mark {
    width: 38px;
    height: 38px;
    border-radius: 12px;
    border: 1px solid var(--line-strong);
    background:
      linear-gradient(135deg, rgba(255,255,255,0.9), rgba(235,226,211,0.9));
    position: relative;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
  }

  .brand-mark::before,
  .brand-mark::after {
    content: '';
    position: absolute;
    background: var(--ink);
    border-radius: 999px;
  }

  .brand-mark::before {
    width: 11px;
    height: 3px;
    left: 10px;
    top: 13px;
    transform: rotate(-45deg);
  }

  .brand-mark::after {
    width: 15px;
    height: 3px;
    left: 14px;
    top: 21px;
    transform: rotate(-45deg);
  }

  .brand-copy {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }

  .brand-name {
    font-size: 16px;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .brand-tagline {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }

  .nav-link,
  .lang-toggle {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 0 14px;
    border-radius: 999px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--muted);
    border: 1px solid transparent;
    background: transparent;
    cursor: pointer;
    transition: background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }

  .nav-link:hover,
  .lang-toggle:hover {
    color: var(--ink);
    background: rgba(255,255,255,0.5);
    border-color: var(--line);
  }

  .nav-cta {
    color: #fff;
    background: var(--ink);
    border-color: var(--ink);
  }

  .nav-cta:hover {
    background: #2b2520;
    border-color: #2b2520;
    color: #fff;
  }

  .hero {
    padding: 48px 0 56px;
  }

  .hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.02fr) minmax(360px, 0.98fr);
    gap: 44px;
    align-items: start;
  }

  .hero-copy {
    padding-top: 36px;
  }

  .hero-title {
    margin-top: 22px;
    max-width: 10.6em;
    font-size: clamp(50px, 7vw, 94px);
    line-height: 0.97;
  }

  .hero-desc {
    max-width: 620px;
    margin-top: 26px;
    font-size: clamp(18px, 2.2vw, 22px);
    line-height: 1.72;
    color: var(--muted);
  }

  .hero-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: 30px;
  }

  .button {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 52px;
    padding: 0 24px;
    border-radius: 999px;
    text-decoration: none;
    border: 1px solid var(--line-strong);
    background: rgba(255,255,255,0.46);
    font-size: 15px;
    font-weight: 800;
    transition: transform 0.18s ease, background 0.18s ease, border-color 0.18s ease;
  }

  .button:hover {
    transform: translateY(-1px);
  }

  .button-primary {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
    box-shadow: 0 14px 28px rgba(40, 77, 115, 0.18);
  }

  .button-primary:hover {
    background: #213f5f;
    border-color: #213f5f;
  }

  .button-secondary:hover {
    background: rgba(255,255,255,0.85);
    border-color: var(--line);
  }

  .hero-proof {
    margin-top: 34px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
  }

  .proof-item {
    display: grid;
    gap: 6px;
  }

  .proof-item strong {
    font-size: 18px;
    font-weight: 800;
  }

  .proof-item span {
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
  }

  .hero-visual {
    position: relative;
    min-height: 680px;
  }

  .visual-panel {
    position: sticky;
    top: 106px;
    padding: 28px;
    border: 1px solid var(--line);
    border-radius: 34px;
    background:
      linear-gradient(180deg, rgba(255,255,255,0.9), rgba(246,240,231,0.78));
    box-shadow: var(--shadow);
    overflow: hidden;
  }

  .visual-panel::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      linear-gradient(135deg, rgba(40,77,115,0.08), transparent 36%),
      linear-gradient(315deg, rgba(184,110,79,0.08), transparent 34%);
  }

  .panel-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 18px;
    font-size: 12px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    position: relative;
  }

  .panel-label strong {
    color: var(--ink);
    font-weight: 800;
    letter-spacing: 0.08em;
  }

  .panel-stack {
    position: relative;
    margin-top: 22px;
    min-height: 520px;
  }

  .shot {
    position: absolute;
    overflow: hidden;
    border-radius: 24px;
    border: 1px solid rgba(23,20,17,0.12);
    background: rgba(255,255,255,0.75);
    box-shadow: 0 18px 40px rgba(32, 25, 20, 0.12);
  }

  .shot img {
    display: block;
    width: 100%;
    height: auto;
  }

  .shot-main {
    inset: 18px 44px 112px 0;
    transform: rotate(-3deg);
  }

  .shot-export {
    width: 48%;
    right: 0;
    bottom: 0;
    transform: rotate(6deg);
  }

  .floating-note {
    position: absolute;
    max-width: 220px;
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid var(--line);
    background: rgba(255, 251, 245, 0.92);
    box-shadow: 0 14px 30px rgba(39, 29, 20, 0.09);
    backdrop-filter: blur(10px);
    font-size: 13px;
    line-height: 1.55;
    color: var(--muted);
  }

  .floating-note strong {
    display: block;
    margin-bottom: 6px;
    color: var(--ink);
    font-size: 12px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .note-top {
    top: 82px;
    right: 16px;
  }

  .note-bottom {
    left: 26px;
    bottom: 22px;
  }

  .manifesto {
    padding: 24px 0 28px;
  }

  .manifesto-card {
    display: grid;
    grid-template-columns: 180px minmax(0, 1fr);
    gap: 22px;
    padding: 26px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }

  .manifesto-label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    padding-top: 10px;
  }

  .manifesto-quote {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-size: clamp(28px, 4vw, 44px);
    line-height: 1.42;
    max-width: 18em;
  }

  .story-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.78fr) minmax(0, 1.22fr);
    gap: 42px;
    align-items: start;
  }

  .section-head {
    display: grid;
    gap: 18px;
  }

  .section-head h2 {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-size: clamp(34px, 4vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.03em;
  }

  .section-head p {
    max-width: 540px;
    color: var(--muted);
    font-size: 17px;
    line-height: 1.75;
  }

  .story-list {
    display: grid;
    gap: 0;
    border-top: 1px solid var(--line);
  }

  .story-item {
    display: grid;
    grid-template-columns: 120px minmax(0, 1fr);
    gap: 22px;
    padding: 24px 0;
    border-bottom: 1px solid var(--line);
  }

  .story-index {
    font-size: 12px;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .story-content h3 {
    font-size: 22px;
    margin-bottom: 8px;
    letter-spacing: -0.03em;
  }

  .story-content p {
    color: var(--muted);
    line-height: 1.72;
    font-size: 15px;
  }

  .principles-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 18px;
    margin-top: 30px;
  }

  .principle-card {
    min-height: 250px;
    padding: 26px;
    border-radius: var(--radius-lg);
    border: 1px solid var(--line);
    background: var(--surface);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
  }

  .principle-no {
    display: inline-flex;
    min-width: 44px;
    min-height: 32px;
    align-items: center;
    justify-content: center;
    border-radius: 999px;
    background: var(--accent-soft);
    color: var(--accent);
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .principle-card h3 {
    margin-top: 22px;
    font-size: 23px;
    letter-spacing: -0.03em;
  }

  .principle-card p {
    margin-top: 12px;
    font-size: 15px;
    line-height: 1.72;
    color: var(--muted);
  }

  .workflow-grid {
    display: grid;
    grid-template-columns: minmax(0, 0.9fr) minmax(0, 1.1fr);
    gap: 32px;
    align-items: start;
  }

  .timeline {
    display: grid;
    gap: 18px;
  }

  .timeline-step {
    display: grid;
    grid-template-columns: 74px minmax(0, 1fr);
    gap: 18px;
    padding: 22px;
    border-radius: 24px;
    border: 1px solid var(--line);
    background: var(--surface-strong);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.88);
  }

  .timeline-no {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--ink);
    color: #fff;
    font-size: 17px;
    font-weight: 800;
  }

  .timeline-step h3 {
    font-size: 21px;
    margin-bottom: 8px;
    letter-spacing: -0.03em;
  }

  .timeline-step p {
    color: var(--muted);
    font-size: 15px;
    line-height: 1.72;
  }

  .workflow-card {
    padding: 30px;
    border-radius: 32px;
    border: 1px solid var(--line);
    background:
      linear-gradient(180deg, rgba(255,255,255,0.92), rgba(246,240,231,0.82));
    box-shadow: var(--shadow);
  }

  .workflow-card h3 {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-size: clamp(28px, 3vw, 40px);
    line-height: 1.18;
    letter-spacing: -0.03em;
  }

  .workflow-card p {
    margin-top: 14px;
    color: var(--muted);
    line-height: 1.75;
    font-size: 16px;
  }

  .workflow-list {
    list-style: none;
    display: grid;
    gap: 12px;
    margin-top: 24px;
  }

  .workflow-list li {
    padding: 14px 0;
    border-top: 1px solid var(--line);
    font-size: 15px;
    line-height: 1.6;
    color: var(--muted);
  }

  .workflow-list strong {
    color: var(--ink);
  }

  .cta {
    padding: 46px 0 76px;
  }

  .cta-box {
    padding: 38px;
    border-radius: 36px;
    border: 1px solid var(--line-strong);
    background: linear-gradient(135deg, rgba(255,255,255,0.9), rgba(235,226,211,0.94));
    box-shadow: var(--shadow);
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 24px;
    align-items: center;
  }

  .cta-copy h2 {
    font-family: 'Noto Serif SC', Georgia, serif;
    font-size: clamp(32px, 4vw, 52px);
    line-height: 1.08;
    letter-spacing: -0.03em;
  }

  .cta-copy p {
    margin-top: 12px;
    max-width: 620px;
    color: var(--muted);
    font-size: 17px;
    line-height: 1.72;
  }

  .cta-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  footer {
    padding: 24px 0 42px;
    border-top: 1px solid var(--line);
  }

  .footer-inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--muted);
  }

  .footer-links {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }

  .footer-links a {
    text-decoration: none;
  }

  .footer-links a:hover {
    color: var(--ink);
  }

  @media (max-width: 1080px) {
    .hero-grid,
    .story-grid,
    .workflow-grid,
    .cta-box {
      grid-template-columns: 1fr;
    }

    .hero-visual {
      min-height: auto;
    }

    .visual-panel {
      position: relative;
      top: 0;
    }

    .cta-actions {
      justify-content: flex-start;
    }
  }

  @media (max-width: 820px) {
    .topbar-inner {
      min-height: 70px;
    }

    .nav-links a[href^="#"] {
      display: none;
    }

    .hero {
      padding: 28px 0 42px;
    }

    .hero-copy {
      padding-top: 8px;
    }

    .hero-proof,
    .principles-grid {
      grid-template-columns: 1fr;
    }

    .manifesto-card,
    .story-item {
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .panel-stack {
      min-height: 420px;
    }

    .shot-main {
      inset: 18px 12px 100px 0;
    }

    .floating-note {
      max-width: 180px;
      padding: 12px 14px;
    }
  }

  @media (max-width: 620px) {
    .container {
      width: min(var(--content), calc(100% - 24px));
    }

    .brand-tagline {
      display: none;
    }

    .nav-links {
      gap: 6px;
    }

    .nav-link,
    .lang-toggle {
      min-height: 38px;
      padding: 0 12px;
    }

    .hero-title {
      font-size: clamp(42px, 15vw, 64px);
      max-width: none;
    }

    .hero-actions,
    .cta-actions {
      flex-direction: column;
      align-items: stretch;
    }

    .button {
      width: 100%;
    }

    .visual-panel,
    .workflow-card,
    .cta-box {
      padding: 22px;
      border-radius: 28px;
    }

    .panel-stack {
      min-height: 320px;
    }

    .shot-main {
      inset: 10px 12px 86px 0;
    }

    .shot-export {
      width: 54%;
    }

    .note-top {
      top: auto;
      bottom: 110px;
      right: 8px;
    }

    .note-bottom {
      left: 14px;
      bottom: 10px;
    }

    .timeline-step {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>
<body>
<div class="page-shell">
  <header class="topbar">
    <div class="container topbar-inner">
      <a href="/" class="brand" aria-label="Tweet Quote">
        <span class="brand-mark" aria-hidden="true"></span>
        <span class="brand-copy">
          <span class="brand-name">Tweet Quote</span>
          <span class="brand-tagline" data-i18n="brand.tagline"></span>
        </span>
      </a>
      <nav class="nav-links">
        <a href="#story" class="nav-link" data-i18n="nav.story"></a>
        <a href="#principles" class="nav-link" data-i18n="nav.principles"></a>
        <a href="#workflow" class="nav-link" data-i18n="nav.workflow"></a>
        <a href="https://github.com/yangwenmai/tweetquote" target="_blank" rel="noreferrer" class="nav-link">GitHub</a>
        <button class="lang-toggle" id="langToggle" onclick="switchLang()"></button>
        <a href="#" class="nav-link nav-cta" onclick="return handleInstall()" data-i18n="nav.cta"></a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero">
      <div class="container hero-grid">
        <div class="hero-copy">
          <span class="eyebrow" data-i18n="hero.eyebrow"></span>
          <h1 class="hero-title display" data-i18n-html="hero.title"></h1>
          <p class="hero-desc" data-i18n-html="hero.desc"></p>
          <div class="hero-actions">
            <a href="#" class="button button-primary" onclick="return handleInstall()" data-i18n="hero.primary"></a>
            <a href="#" class="button button-secondary" onclick="return handleOpenApp()" data-i18n="hero.secondary"></a>
          </div>
          <div class="hero-proof">
            <div class="proof-item">
              <strong data-i18n="hero.proof1.title"></strong>
              <span data-i18n="hero.proof1.desc"></span>
            </div>
            <div class="proof-item">
              <strong data-i18n="hero.proof2.title"></strong>
              <span data-i18n="hero.proof2.desc"></span>
            </div>
            <div class="proof-item">
              <strong data-i18n="hero.proof3.title"></strong>
              <span data-i18n="hero.proof3.desc"></span>
            </div>
          </div>
        </div>

        <div class="hero-visual">

const APP_URL = 'http://159.89.204.255:8088/';
const EXTENSION_URL = '/extension/';
let lang = localStorage.getItem('tq_landing_lang') || (navigator.language.startsWith('zh') ? 'zh-CN' : 'en');

function t(key) {
  return (I18N[lang] || I18N['zh-CN'])[key] || key;
}

function applyLang() {
  document.documentElement.lang = lang;
  document.getElementById('langToggle').textContent = t('lang.toggle');

  document.querySelectorAll('[data-i18n]').forEach((el) => {
    el.textContent = t(el.dataset.i18n);
  });

  document.querySelectorAll('[data-i18n-html]').forEach((el) => {
    el.innerHTML = t(el.dataset.i18nHtml);
  });

  document.querySelectorAll('[data-i18n-alt]').forEach((el) => {
    el.alt = t(el.dataset.i18nAlt);
  });
}

function switchLang() {
  lang = lang === 'zh-CN' ? 'en' : 'zh-CN';
  localStorage.setItem('tq_landing_lang', lang);
  applyLang();
}

function handleInstall() {
  window.open(EXTENSION_URL, '_blank');
  return false;
}

function handleOpenApp() {
  if (APP_URL) {
    window.open(APP_URL, '_blank');
  } else {
    alert(t('try.alert'));
  }
  return false;
}
